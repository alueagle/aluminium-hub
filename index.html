<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluminium Hub - نظام إدارة الورش</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Aluminium Hub">
    <meta name="application-name" content="Aluminium Hub">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .role-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .role-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border-color: #4f46e5;
        }
        .role-card.selected {
            border-color: #4f46e5;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: none;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-effect rounded-2xl p-8 max-w-md w-full fade-in">
            <!-- Header -->
            <header class="text-center mb-8">
                <div class="mb-4">
                    <i class="fas fa-industry text-6xl text-indigo-600"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Aluminium Hub</h1>
                <p class="text-gray-600">نظام إدارة ورش الألومنيوم المتكامل</p>
            </header>

            <!-- Error Message -->
            <div id="error-message" class="error">
                <i class="fas fa-exclamation-triangle ml-2"></i>
                <span id="error-text"></span>
            </div>

            <!-- Role Selection -->
            <section id="role-selection" class="mb-8">
                <h2 class="text-xl font-semibold text-center mb-6 text-gray-800">
                    <i class="fas fa-user-tag text-indigo-600 ml-2"></i>
                    اختر دورك
                </h2>
                
                <div class="space-y-4">
                    <!-- Admin Role -->
                    <div class="role-card bg-white rounded-xl p-6" onclick="selectRole('admin')">
                        <div class="flex items-center">
                            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center ml-4">
                                <i class="fas fa-user-tie text-2xl text-blue-600"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-lg font-bold text-gray-800">مدير النظام</h3>
                                <p class="text-sm text-gray-600">التحكم الكامل في النظام وإدارة المستخدمين</p>
                            </div>
                            <div class="role-indicator">
                                <i class="fas fa-check-circle text-2xl text-green-500 hidden"></i>
                            </div>
                        </div>
                        <div class="mt-4 flex flex-wrap gap-2">
                            <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full">لوحة التحكم</span>
                            <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full">تقارير</span>
                            <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full">إعدادات</span>
                        </div>
                    </div>

                    <!-- Technician Role -->
                    <div class="role-card bg-white rounded-xl p-6" onclick="selectRole('technician')">
                        <div class="flex items-center">
                            <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center ml-4">
                                <i class="fas fa-hard-hat text-2xl text-orange-600"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-lg font-bold text-gray-800">فني/صنايعي</h3>
                                <p class="text-sm text-gray-600">مسح QR codes وتسجيل العمليات اليومية</p>
                            </div>
                            <div class="role-indicator">
                                <i class="fas fa-check-circle text-2xl text-green-500 hidden"></i>
                            </div>
                        </div>
                        <div class="mt-4 flex flex-wrap gap-2">
                            <span class="px-2 py-1 bg-orange-100 text-orange-700 text-xs rounded-full">مسح QR</span>
                            <span class="px-2 py-1 bg-orange-100 text-orange-700 text-xs rounded-full">قطع</span>
                            <span class="px-2 py-1 bg-orange-100 text-orange-700 text-xs rounded-full">مخزون</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Login Form -->
            <section id="login-form" class="hidden">
                <h2 class="text-xl font-semibold text-center mb-6 text-gray-800">
                    <i class="fas fa-sign-in-alt text-indigo-600 ml-2"></i>
                    تسجيل الدخول
                </h2>
                
                <form id="login-form-element" onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            اسم المستخدم
                        </label>
                        <div class="relative">
                            <i class="fas fa-user absolute right-3 top-3 text-gray-400"></i>
                            <input type="text" id="username" required
                                   class="w-full pr-10 pl-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                   placeholder="أدخل اسم المستخدم">
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            كلمة المرور
                        </label>
                        <div class="relative">
                            <i class="fas fa-lock absolute right-3 top-3 text-gray-400"></i>
                            <input type="password" id="password" required
                                   class="w-full pr-10 pl-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                   placeholder="أدخل كلمة المرور">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="flex items-center">
                            <input type="checkbox" id="remember-me" class="ml-2">
                            <span class="text-sm text-gray-600">تذكرني</span>
                        </label>
                    </div>

                    <button type="submit" id="login-btn" 
                            class="btn-primary w-full text-white py-3 rounded-lg font-semibold disabled:opacity-50">
                        <span id="login-btn-text">
                            <i class="fas fa-sign-in-alt ml-2"></i>
                            تسجيل الدخول
                        </span>
                        <span id="login-loading" class="hidden">
                            <i class="fas fa-spinner fa-spin ml-2"></i>
                            جاري تسجيل الدخول...
                        </span>
                    </button>
                </form>
            </section>

            <!-- Quick Access -->
            <section class="mt-6 pt-6 border-t border-gray-200">
                <div class="text-center">
                    <p class="text-sm text-gray-600 mb-3">وصول سريع:</p>
                    <div class="flex justify-center space-x-4 space-x-reverse">
                        <button onclick="quickLogin('admin')" 
                                class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 transition-colors text-sm">
                            <i class="fas fa-user-tie ml-1"></i>
                            أدمن
                        </button>
                        <button onclick="quickLogin('worker1')" 
                                class="px-4 py-2 bg-orange-100 text-orange-700 rounded-lg hover:bg-orange-200 transition-colors text-sm">
                            <i class="fas fa-hard-hat ml-1"></i>
                            صنايعي
                        </button>
                    </div>
                </div>
            </section>

            <!-- Back Button -->
            <button id="back-btn" onclick="backToRoleSelection()" 
                    class="hidden mt-4 w-full py-2 text-gray-600 hover:text-gray-800 transition-colors">
                <i class="fas fa-arrow-right ml-2"></i>
                العودة لاختيار الدور
            </button>
        </div>
    </div>

    <script>
        // Global variables
        let selectedRole = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            const user = getCurrentUser();
            if (user) {
                redirectToApp(user.role);
            }
        });

        // Role selection
        function selectRole(role) {
            selectedRole = role;
            
            // Update UI
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('selected');
                card.querySelector('.role-indicator i').classList.add('hidden');
            });
            
            const selectedCard = event.currentTarget;
            selectedCard.classList.add('selected');
            selectedCard.querySelector('.role-indicator i').classList.remove('hidden');
            
            // Show login form after a short delay
            setTimeout(() => {
                showLoginForm();
            }, 300);
        }

        function showLoginForm() {
            document.getElementById('role-selection').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            
            // Focus on username field
            document.getElementById('username').focus();
            
            // Set placeholder based on role
            const usernameField = document.getElementById('username');
            if (selectedRole === 'admin') {
                usernameField.placeholder = 'مثال: admin';
            } else {
                usernameField.placeholder = 'مثال: worker1';
            }
        }

        function backToRoleSelection() {
            selectedRole = null;
            document.getElementById('role-selection').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            
            // Reset role selection UI
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('selected');
                card.querySelector('.role-indicator i').classList.add('hidden');
            });
            
            // Clear form
            document.getElementById('login-form-element').reset();
            hideError();
        }

        // Login functions
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;
            
            if (!username || !password) {
                showError('رجاء إدخال اسم المستخدم وكلمة المرور');
                return;
            }
            
            // Validate role matches username
            if (selectedRole === 'admin' && !username.includes('admin')) {
                showError('اسم المستخدم غير متوافق مع دور المدير');
                return;
            }
            
            if (selectedRole === 'technician' && username.includes('admin')) {
                showError('اسم المستخدم غير متوافق مع دور الفني');
                return;
            }
            
            // Show loading
            showLoginLoading(true);
            hideError();
            
            try {
                // Simulate login validation (in real app, this would be API call)
                await simulateLogin(username, password, selectedRole);
                
                // Save user session
                const userData = {
                    username: username,
                    full_name: getFullName(username),
                    role: selectedRole === 'admin' ? 'admin' : 'technician',
                    login_time: new Date().toISOString()
                };
                
                if (rememberMe) {
                    localStorage.setItem('aluminium_hub_user', JSON.stringify(userData));
                } else {
                    sessionStorage.setItem('aluminium_hub_user', JSON.stringify(userData));
                }
                
                // Redirect to appropriate app
                redirectToApp(selectedRole === 'admin' ? 'admin' : 'technician');
                
            } catch (error) {
                showError(error.message);
            } finally {
                showLoginLoading(false);
            }
        }

        function showLoginLoading(show) {
            const btnText = document.getElementById('login-btn-text');
            const btnLoading = document.getElementById('login-loading');
            const loginBtn = document.getElementById('login-btn');
            
            if (show) {
                btnText.classList.add('hidden');
                btnLoading.classList.remove('hidden');
                loginBtn.disabled = true;
            } else {
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
                loginBtn.disabled = false;
            }
        }

        function simulateLogin(username, password, role) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    // Simple validation (in real app, this would be server-side)
                    const validUsers = {
                        'admin': { password: 'admin123', role: 'admin' },
                        'supervisor': { password: 'sup123', role: 'admin' },
                        'worker1': { password: 'worker123', role: 'technician' },
                        'worker2': { password: 'worker123', role: 'technician' },
                        'technician1': { password: 'tech123', role: 'technician' }
                    };
                    
                    const user = validUsers[username];
                    if (!user) {
                        reject(new Error('اسم المستخدم غير موجود'));
                        return;
                    }
                    
                    if (user.password !== password) {
                        reject(new Error('كلمة المرور غير صحيحة'));
                        return;
                    }
                    
                    if ((role === 'admin' && user.role !== 'admin') || 
                        (role === 'technician' && user.role !== 'technician')) {
                        reject(new Error('الدور المختار لا يتطابق مع صلاحيات المستخدم'));
                        return;
                    }
                    
                    resolve(user);
                }, 1000);
            });
        }

        // Quick login functions
        function quickLogin(username) {
            // Set role based on username
            selectedRole = username.includes('admin') ? 'admin' : 'technician';
            
            // Fill form and submit
            document.getElementById('username').value = username;
            document.getElementById('password').value = getDefaultPassword(username);
            document.getElementById('remember-me').checked = true;
            
            // Trigger login
            handleLogin(new Event('submit'));
        }

        function getDefaultPassword(username) {
            const passwords = {
                'admin': 'admin123',
                'supervisor': 'sup123',
                'worker1': 'worker123',
                'worker2': 'worker123',
                'technician1': 'tech123'
            };
            return passwords[username] || 'worker123';
        }

        // Utility functions
        function getCurrentUser() {
            const userStr = localStorage.getItem('aluminium_hub_user') || 
                           sessionStorage.getItem('aluminium_hub_user');
            return userStr ? JSON.parse(userStr) : null;
        }

        function getFullName(username) {
            const names = {
                'admin': 'مدير النظام',
                'supervisor': 'المشرف',
                'worker1': 'الفني الأول',
                'worker2': 'الفني الثاني',
                'technician1': 'الفني التقني'
            };
            return names[username] || username;
        }

        function redirectToApp(role) {
            if (role === 'admin') {
                window.location.href = 'admin_dashboard.html';
            } else {
                window.location.href = 'mobile_technician_app_real.html';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorDiv.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(hideError, 5000);
        }

        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }

        // Handle Enter key in role selection
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter' && selectedRole && document.getElementById('role-selection').style.display !== 'none') {
                showLoginForm();
            }
        });
    </script>
</body>
</html>

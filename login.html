<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluminium Hub - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-focus:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- Background Pattern -->
    <div class="absolute inset-0 opacity-10">
        <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60"><g fill-opacity="0.1"><path d="M30 30L0 0h60z" fill="%23fff"/><path d="M30 30L60 0v60z" fill="%23fff"/><path d="M30 30L0 60V0z" fill="%23fff"/><path d="M30 30L60 60H0z" fill="%23fff"/></g></svg>');"></div>
    </div>

    <!-- Login Container -->
    <div class="glass-effect rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in relative z-10">
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full mb-4 shadow-lg">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Aluminium Hub</h1>
            <p class="text-gray-600">نظام إدارة ورش الألومنيوم</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <!-- Username Input -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    اسم المستخدم
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        class="input-focus w-full pr-10 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none transition-all duration-200"
                        placeholder="أدخل اسم المستخدم"
                        autocomplete="username"
                    >
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    كلمة المرور
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="input-focus w-full pr-10 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none transition-all duration-200"
                        placeholder="أدخل كلمة المرور"
                        autocomplete="current-password"
                    >
                </div>
            </div>

            <!-- Remember Me -->
            <div class="flex items-center">
                <input
                    id="remember"
                    name="remember"
                    type="checkbox"
                    class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                >
                <label for="remember" class="mr-2 block text-sm text-gray-700">
                    تذكرني
                </label>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                <div class="flex items-center">
                    <svg class="w-5 h-5 ml-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                    </svg>
                    <span>اسم المستخدم أو كلمة المرور غير صحيحة</span>
                </div>
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                class="btn-primary w-full py-3 px-4 text-white font-medium rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
            >
                <span class="flex items-center justify-center">
                    <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                    تسجيل الدخول
                </span>
            </button>
        </form>

        <!-- Quick Access Demo -->
        <div class="mt-6 pt-6 border-t border-gray-200">
            <div class="text-center text-sm text-gray-600">
                <p class="mb-3">دخول سريع للتجربة:</p>
                <div class="space-y-2">
                    <button onclick="quickLogin('admin', 'admin123')" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg transition-colors duration-200 text-sm">
                        <strong>admin</strong> / admin123 (مدير)
                    </button>
                    <button onclick="quickLogin('worker1', 'worker123')" class="w-full bg-green-50 hover:bg-green-100 text-green-700 px-3 py-2 rounded-lg transition-colors duration-200 text-sm">
                        <strong>worker1</strong> / worker123 (صنايعي)
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-6 text-center text-xs text-gray-500">
            <p>Aluminium Hub © 2026</p>
            <p class="mt-1">نسخة 1.0.0</p>
        </div>
    </div>

    <script>
        // Users database
        const users = {
            'admin': {
                password: 'admin123',
                role: 'admin',
                name: 'مدير النظام',
                redirect: 'admin_dashboard.html'
            },
            'worker1': {
                password: 'worker123',
                role: 'worker',
                name: 'صنايعي 1',
                redirect: 'mobile_technician_app.html'
            }
        };

        // Check if user is already logged in
        function checkExistingSession() {
            const savedUser = localStorage.getItem('currentUser');
            const rememberMe = localStorage.getItem('rememberMe');
            
            if (savedUser && rememberMe === 'true') {
                const user = JSON.parse(savedUser);
                redirectToDashboard(user);
            }
        }

        // Quick login function
        function quickLogin(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorMessage = document.getElementById('errorMessage');
            
            // Hide error message
            errorMessage.classList.add('hidden');
            
            // Validate credentials
            if (users[username] && users[username].password === password) {
                const user = {
                    username: username,
                    role: users[username].role,
                    name: users[username].name,
                    loginTime: new Date().toISOString()
                };
                
                // Save session
                localStorage.setItem('currentUser', JSON.stringify(user));
                localStorage.setItem('rememberMe', remember.toString());
                
                // Show success message
                showSuccessMessage();
                
                // Redirect after short delay
                setTimeout(() => {
                    redirectToDashboard(users[username]);
                }, 1000);
                
            } else {
                // Show error message
                errorMessage.classList.remove('hidden');
                
                // Shake animation
                const form = document.getElementById('loginForm');
                form.classList.add('animate-pulse');
                setTimeout(() => {
                    form.classList.remove('animate-pulse');
                }, 500);
            }
        });

        // Show success message
        function showSuccessMessage() {
            const successDiv = document.createElement('div');
            successDiv.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 fade-in';
            successDiv.innerHTML = `
                <div class="flex items-center">
                    <svg class="w-5 h-5 ml-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                    </svg>
                    <span>تم تسجيل الدخول بنجاح!</span>
                </div>
            `;
            document.body.appendChild(successDiv);
            
            setTimeout(() => {
                successDiv.remove();
            }, 3000);
        }

        // Redirect to appropriate dashboard
        function redirectToDashboard(user) {
            window.location.href = user.redirect;
        }

        // Check existing session on page load
        document.addEventListener('DOMContentLoaded', function() {
            checkExistingSession();
            
            // Focus on username field
            document.getElementById('username').focus();
        });

        // Add enter key support for quick login buttons
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const activeElement = document.activeElement;
                if (activeElement.tagName === 'BUTTON' && activeElement.onclick) {
                    activeElement.click();
                }
            }
        });
    </script>
</body>
</html>
